<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>VMT – Receptionist Panel</title>
  <link rel="stylesheet" href="css/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css"/>
  <style>
    .top-nav { background: var(--primary); padding: 14px 30px; display: flex; justify-content: space-between; align-items: center; }
    .top-nav .brand { color: white; font-weight: 700; font-size: 1.1rem; }
    .top-nav .brand span { color: var(--accent); }
    .top-nav .user-info { color: rgba(255,255,255,0.8); font-size: 0.9rem; display: flex; align-items: center; gap: 16px; }
    .top-nav .user-info button { background: rgba(255,255,255,0.1); border: none; color: white; padding: 6px 14px; border-radius: 6px; cursor: pointer; font-family: inherit; }

    .page-body { padding: 28px; max-width: 1300px; margin: 0 auto; }

    .stats-row { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px; }

    .two-col { display: grid; grid-template-columns: 350px 1fr; gap: 24px; }

    .checkin-form { background: white; border-radius: var(--radius); padding: 28px; box-shadow: var(--shadow); height: fit-content; }
    .checkin-form h3 { color: var(--primary); font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; display: flex; align-items: center; gap: 8px; }

    .visitors-section { background: white; border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; }
    .visitors-section .section-header { padding: 20px 24px; display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eef1f8; }
    .visitors-section h3 { color: var(--primary); font-size: 1.1rem; font-weight: 700; }

    .table-wrap { overflow-x: auto; }

    .action-btn { background: none; border: 1px solid; padding: 4px 12px; border-radius: 6px; cursor: pointer; font-size: 0.8rem; font-family: inherit; font-weight: 500; transition: all 0.2s; }
    .action-btn.checkout { border-color: var(--danger); color: var(--danger); }
    .action-btn.checkout:hover { background: var(--danger); color: white; }
    .action-btn.badge { border-color: var(--primary); color: var(--primary); }
    .action-btn.badge:hover { background: var(--primary); color: white; }

    .modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: 999; align-items: center; justify-content: center; }
    .modal-overlay.active { display: flex; }
    .badge-modal { background: white; border-radius: 16px; padding: 36px; width: 340px; text-align: center; }
    .badge-modal .badge-logo { color: var(--primary); font-weight: 800; font-size: 1.1rem; margin-bottom: 16px; }
    .badge-modal .badge-logo span { color: var(--accent); }
    .badge-modal .visitor-name { font-size: 1.3rem; font-weight: 700; color: var(--dark); margin-bottom: 4px; }
    .badge-modal .visitor-sub { color: #888; font-size: 0.85rem; margin-bottom: 20px; }
    .badge-modal .qr-area { background: var(--light); border-radius: 12px; padding: 20px; margin-bottom: 16px; }
    .badge-modal .qr-area img { width: 160px; height: 160px; }
    .badge-modal .badge-info { display: flex; justify-content: space-between; font-size: 0.8rem; color: #666; }

    @media(max-width:900px) { .two-col { grid-template-columns: 1fr; } .stats-row { grid-template-columns: repeat(2,1fr); } }
  </style>
</head>
<body>

<div class="top-nav">
  <div class="brand">VMT <span>|</span> Receptionist</div>
  <div class="user-info">
    <span><i class="fas fa-user-circle"></i> <span id="userName">Loading...</span></span>
    <button onclick="logout()"><i class="fas fa-sign-out-alt"></i> Logout</button>
  </div>
</div>

<div class="page-body">
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-number" id="statTotal">-</div>
      <div class="stat-label"><i class="fas fa-users"></i> Total Today</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="statActive">-</div>
      <div class="stat-label"><i class="fas fa-door-open"></i> Inside Now</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="statCheckedOut">-</div>
      <div class="stat-label"><i class="fas fa-check"></i> Checked Out</div>
    </div>
    <div class="stat-card">
      <div class="stat-number" id="statPending">-</div>
      <div class="stat-label"><i class="fas fa-clock"></i> Pending</div>
    </div>
  </div>

  <div class="two-col">
    <div class="checkin-form">
      <h3><i class="fas fa-user-plus" style="color:var(--accent)"></i> Walk-in Check-In</h3>

      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">Visitor Name *</label>
        <input type="text" id="ciName" class="form-control" placeholder="Full name"/>
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">Phone *</label>
        <input type="tel" id="ciPhone" class="form-control" placeholder="Phone number"/>
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">Company</label>
        <input type="text" id="ciCompany" class="form-control" placeholder="Organization"/>
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">Host *</label>
        <select id="ciHost" class="form-select">
          <option value="">-- Select Host --</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom:14px">
        <label class="form-label">Purpose *</label>
        <select id="ciPurpose" class="form-select">
          <option value="">-- Select --</option>
          <option>Business Meeting</option>
          <option>Sales / Demo</option>
          <option>Delivery</option>
          <option>Interview</option>
          <option>Audit / Inspection</option>
          <option>Personal Visit</option>
        </select>
      </div>
      <div class="form-group" style="margin-bottom:20px">
        <label class="form-label">Plant</label>
        <select id="ciPlant" class="form-select">
          <option>Plant 1 - Delhi</option>
          <option>Plant 2 - Mumbai</option>
          <option>Plant 3 - Chennai</option>
          <option>Head Office - Gurugram</option>
        </select>
      </div>

      <button class="btn-accent-vmt" style="width:100%" onclick="doCheckin()">
        <i class="fas fa-sign-in-alt"></i> &nbsp;<span id="ciBtnText">Check In Visitor</span>
      </button>
    </div>

    <div class="visitors-section">
      <div class="section-header">
        <h3><i class="fas fa-list" style="color:var(--accent)"></i> Today's Visitors</h3>
        <button class="btn-primary-vmt" style="padding:8px 18px; font-size:0.85rem" onclick="loadVisitors()">
          <i class="fas fa-sync"></i> Refresh
        </button>
      </div>
      <div class="table-wrap">
        <table class="vmt-table">
          <thead>
            <tr>
              <th>Visitor</th>
              <th>Company</th>
              <th>Host</th>
              <th>Purpose</th>
              <th>Check-In</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="visitorsTable">
            <tr><td colspan="7" style="text-align:center; padding:30px; color:#888">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="badgeModal">
  <div class="badge-modal">
    <div class="badge-logo">VMT <span>|</span> Orientbell</div>
    <div class="visitor-name" id="bmName">-</div>
    <div class="visitor-sub" id="bmSub">-</div>
    <div class="qr-area">
      <img id="bmQR" src="" alt="QR Code"/>
    </div>
    <div class="badge-info">
      <span id="bmPurpose">-</span>
      <span id="bmTime">-</span>
    </div>
    <div style="margin-top:20px; display:flex; gap:10px; justify-content:center">
      <button class="btn-primary-vmt" style="padding:10px 20px; font-size:0.85rem" onclick="window.print()">
        <i class="fas fa-print"></i> Print
      </button>
      <button class="action-btn" style="border-color:#888; color:#888; padding:10px 20px" onclick="closeBadgeModal()">Close</button>
    </div>
  </div>
</div>

<script src="js/app.js"></script>
<script>
  const user = requireAuth(['receptionist', 'admin']);
  if (user) document.getElementById('userName').textContent = user.name;

  async function loadHosts() {
    try {
      const hosts = await apiCall('/auth/hosts');
      const select = document.getElementById('ciHost');
      hosts.forEach(h => {
        const opt = document.createElement('option');
        opt.value = h.id;
        opt.textContent = `${h.name} (${h.department || ''})`;
        select.appendChild(opt);
      });
    } catch(e) {}
  }

  async function loadVisitors() {
    try {
      const visits = await apiCall('/visits/today');
      const tbody = document.getElementById('visitorsTable');

      const active = visits.filter(v => v.status === 'active').length;
      const checkedOut = visits.filter(v => v.status === 'checked_out').length;
      const pending = visits.filter(v => v.status === 'pending').length;
      document.getElementById('statTotal').textContent = visits.length;
      document.getElementById('statActive').textContent = active;
      document.getElementById('statCheckedOut').textContent = checkedOut;
      document.getElementById('statPending').textContent = pending;

      if (!visits.length) {
        tbody.innerHTML = '<tr><td colspan="7" style="text-align:center; padding:30px; color:#888">No visitors today yet</td></tr>';
        return;
      }

      tbody.innerHTML = visits.map(v => `
        <tr>
          <td><strong>${v.visitor?.name || '-'}</strong><br><small style="color:#888">${v.visitor?.phone || ''}</small></td>
          <td>${v.visitor?.company || '-'}</td>
          <td>${v.host?.name || '-'}</td>
          <td>${v.purpose || '-'}</td>
          <td style="font-size:0.82rem">${formatDate(v.check_in)}</td>
          <td><span class="badge-status badge-${v.status === 'checked_out' ? 'checked-out' : v.status}">${v.status.replace('_', ' ')}</span></td>
          <td style="display:flex; gap:6px; flex-wrap:wrap">
            <button class="action-btn badge" onclick="viewBadge(${v.id}, '${v.visitor?.name}', '${v.visitor?.company}', '${v.purpose}', '${v.check_in}')">
              <i class="fas fa-qrcode"></i> Badge
            </button>
            ${v.status === 'active' ? `<button class="action-btn checkout" onclick="doCheckout(${v.id})"><i class="fas fa-sign-out-alt"></i> Out</button>` : ''}
          </td>
        </tr>
      `).join('');
    } catch(e) {}
  }

  async function doCheckin() {
    const name = document.getElementById('ciName').value.trim();
    const phone = document.getElementById('ciPhone').value.trim();
    const hostId = document.getElementById('ciHost').value;
    const purpose = document.getElementById('ciPurpose').value;

    if (!name || !phone || !hostId || !purpose) {
      showToast('Please fill all required fields', 'error'); return;
    }

    document.getElementById('ciBtnText').innerHTML = '<span class="spinner"></span>';

    try {
      await apiCall('/visits/checkin', 'POST', {
        visitor_name: name,
        visitor_phone: phone,
        visitor_company: document.getElementById('ciCompany').value,
        host_id: parseInt(hostId),
        purpose,
        plant: document.getElementById('ciPlant').value
      });

      showToast(`${name} checked in! Host notified.`, 'success');
      document.getElementById('ciName').value = '';
      document.getElementById('ciPhone').value = '';
      document.getElementById('ciCompany').value = '';
      document.getElementById('ciHost').value = '';
      document.getElementById('ciPurpose').value = '';
      loadVisitors();
    } catch(e) {}
    document.getElementById('ciBtnText').textContent = 'Check In Visitor';
  }

  async function doCheckout(visitId) {
    if (!confirm('Check out this visitor?')) return;
    try {
      await apiCall(`/visits/checkout/${visitId}`, 'PUT');
      showToast('Visitor checked out!', 'success');
      loadVisitors();
    } catch(e) {}
  }

  function viewBadge(visitId, name, company, purpose, checkIn) {
    document.getElementById('bmName').textContent = name;
    document.getElementById('bmSub').textContent = company || 'Visitor';
    document.getElementById('bmPurpose').textContent = purpose;
    document.getElementById('bmTime').textContent = formatDate(checkIn);
    document.getElementById('bmQR').src = `http://localhost:5000/api/badges/qr/${visitId}`;
    document.getElementById('badgeModal').classList.add('active');
  }

  function closeBadgeModal() {
    document.getElementById('badgeModal').classList.remove('active');
  }

  loadHosts();
  loadVisitors();
  setInterval(loadVisitors, 30000);
</script>
</body>
</html>
